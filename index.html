<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lirich Ops — Waste Logistics CRM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f7a4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root{
  --brand:#0f7a4d; --brand-dark:#0b5d3a; --brand-soft:#e2f0e9;
  --bg:#eef2f0; --card:#ffffff; --ink:#1b2620; --muted:#6b7a72; --line:#e2e8e4;
  --amber:#c4860a; --blue:#2563c4; --red:#c4362f; --violet:#7a3fc4;
  --radius:16px; --shadow:0 2px 10px rgba(27,38,32,.07);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink); padding-bottom:88px;
}
button{font-family:inherit}
/* ---------- header ---------- */
header{
  position:sticky; top:0; z-index:30; background:var(--brand); color:#fff;
  padding:12px 16px; box-shadow:0 2px 8px rgba(11,93,58,.25);
}
.hrow{display:flex; align-items:center; justify-content:space-between; max-width:680px; margin:0 auto}
.htitle{font-size:18px; font-weight:800; display:flex; align-items:center; gap:8px}
.hsub{font-size:11.5px; opacity:.85; margin-top:2px; font-weight:600}
.role-pill{
  display:flex; align-items:center; gap:7px; border:none; cursor:pointer;
  background:rgba(255,255,255,.16); color:#fff; border-radius:999px;
  padding:6px 12px 6px 7px; font-size:13px; font-weight:700;
}
.avatar{
  width:26px; height:26px; border-radius:50%; display:inline-flex; flex:none;
  align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#fff;
}
.avatar.lg{width:42px; height:42px; font-size:17px}
/* ---------- layout ---------- */
main{padding:14px 14px 0; max-width:680px; margin:0 auto}
.card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; margin-bottom:12px}
h2{font-size:15px; margin:2px 0 10px; display:flex; align-items:center; gap:7px}
.muted{color:var(--muted); font-size:12.5px}
.row{display:flex; align-items:center; gap:10px}
.grow{flex:1; min-width:0}
.right{text-align:right}
/* ---------- bottom nav ---------- */
nav{
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  background:var(--card); border-top:1px solid var(--line);
  display:flex; justify-content:space-around;
  padding:7px 4px calc(9px + env(safe-area-inset-bottom));
}
nav button{
  background:none; border:none; cursor:pointer; color:var(--muted);
  font-size:10.5px; font-weight:700; display:flex; flex-direction:column;
  align-items:center; gap:2px; padding:5px 10px; border-radius:12px; min-width:60px;
}
nav button .ico{font-size:20px}
nav button.active{color:var(--brand); background:var(--brand-soft)}
/* ---------- KPI tiles ---------- */
.kpis{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px}
.kpi{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:12px 14px}
.kpi .num{font-size:22px; font-weight:800}
.kpi .lbl{font-size:11.5px; color:var(--muted); font-weight:700; margin-top:2px}
.kpi.green .num{color:var(--brand)} .kpi.amber .num{color:var(--amber)}
.kpi.blue .num{color:var(--blue)} .kpi.red .num{color:var(--red)}
/* ---------- chips & tags ---------- */
.chip{font-size:10.5px; font-weight:800; border-radius:999px; padding:3px 9px; white-space:nowrap}
.st-assigned{background:#fdf3dd; color:var(--amber)}
.st-in_progress{background:#e3ebfa; color:var(--blue)}
.st-done{background:var(--brand-soft); color:var(--brand)}
.st-void{background:#fae4e2; color:var(--red)}
.tag{font-size:10px; font-weight:800; background:var(--brand-soft); color:var(--brand); border-radius:6px; padding:2px 6px}
.tag.vessel{background:#efe6fa; color:var(--violet)}
/* ---------- list items ---------- */
.item{display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid var(--line)}
.item.tap{cursor:pointer}
.item:last-child{border-bottom:none}
.item .title{font-weight:700; font-size:13.5px}
.item .sub{font-size:11.5px; color:var(--muted); margin-top:2px}
.icon-btn{background:none; border:none; cursor:pointer; font-size:16px; color:var(--muted); padding:6px; border-radius:8px; flex:none}
.pay{font-weight:800; color:var(--brand); font-size:13.5px; white-space:nowrap}
.empty{padding:24px 10px; text-align:center; color:var(--muted); font-size:13.5px}
/* ---------- filter tabs ---------- */
.ftabs{display:flex; gap:7px; overflow-x:auto; padding:2px 0 8px; scrollbar-width:none}
.ftabs::-webkit-scrollbar{display:none}
.ftabs button{
  flex:none; border:1px solid var(--line); background:var(--card); border-radius:999px;
  padding:7px 13px; font-size:12px; font-weight:700; cursor:pointer; color:var(--ink);
}
.ftabs button.on{background:var(--brand); color:#fff; border-color:var(--brand)}
/* ---------- driver big job cards ---------- */
.djob{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:14px}
.djob-h{font-size:19px; font-weight:800; line-height:1.2}
.djob-sub{font-size:14.5px; color:var(--ink); margin-top:6px}
.djob-sub.muted{color:var(--muted)}
.djob-act{font-size:18px; padding:17px; margin-top:14px; border-radius:14px}
.djob-badge{display:inline-block; font-size:11px; font-weight:800; border-radius:6px; padding:2px 8px; margin-left:6px; vertical-align:middle}
.djob-badge.go{background:var(--brand-soft); color:var(--brand)}
.djob-badge.run{background:#e3ebfa; color:var(--blue)}
input.big, .big select, select.big{font-size:17px; padding:14px}
/* ---------- forms ---------- */
label.f{display:block; font-size:11px; font-weight:800; color:var(--muted); margin:11px 0 4px; letter-spacing:.4px}
input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{
  width:100%; border:1px solid var(--line); border-radius:10px; padding:10px;
  font-size:14.5px; font-family:inherit; background:var(--bg); color:var(--ink);
}
textarea{resize:vertical}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  background:var(--brand); color:#fff; border:none; border-radius:12px;
  padding:11px 16px; font-size:13.5px; font-weight:800; cursor:pointer; width:100%;
}
.btn.ghost{background:var(--brand-soft); color:var(--brand)}
.btn.danger{background:#fae4e2; color:var(--red)}
.btn.blue{background:#e3ebfa; color:var(--blue)}
.btn.wa{background:#25d366; color:#fff}
.btn.slim{width:auto; padding:8px 14px; font-size:12.5px}
.seg{display:flex; gap:6px; flex-wrap:wrap}
.seg button{
  border:1px solid var(--line); background:var(--bg); border-radius:999px;
  padding:7px 12px; font-size:12.5px; cursor:pointer; color:var(--ink); font-weight:700;
}
/* ---------- driver mode: bigger everything (sunlight, gloves, one hand) ---------- */
body.big-ui .btn{font-size:17px; padding:16px 18px}
body.big-ui .btn.slim{font-size:15px; padding:12px 16px}
body.big-ui .djob-act{font-size:20px; padding:20px}
body.big-ui .djob-h{font-size:22px}
body.big-ui .djob-sub{font-size:16.5px}
body.big-ui input[type=text], body.big-ui input[type=number], body.big-ui input[type=date],
body.big-ui input[type=time], body.big-ui select, body.big-ui textarea{font-size:17px; padding:14px}
body.big-ui input[type=file]{font-size:15px; padding:8px 0}
body.big-ui label.f{font-size:13px}
body.big-ui .muted{font-size:14.5px}
body.big-ui .item .title{font-size:16.5px}
body.big-ui .item .sub{font-size:14px}
body.big-ui h2{font-size:17.5px}
body.big-ui .pay{font-size:16px}
body.big-ui .seg button{font-size:15px; padding:10px 15px}
body.big-ui nav button{font-size:12.5px}
body.big-ui nav button .ico{font-size:23px}
body.big-ui table.jt{font-size:14.5px}
.seg button.on{background:var(--brand); color:#fff; border-color:var(--brand)}
.checkline{display:flex; align-items:center; gap:9px; padding:7px 2px; font-size:13.5px; font-weight:600; cursor:pointer}
.checkline input{width:18px; height:18px; accent-color:var(--brand)}
.checkline .amt{margin-left:auto; color:var(--muted); font-weight:700; font-size:12.5px}
.payline{
  background:var(--brand); color:#fff; border-radius:12px;
  padding:12px 16px; display:flex; justify-content:space-between; align-items:center;
  font-weight:800; margin-top:14px; font-size:15px;
}
/* ---------- FAB ---------- */
.fab{
  position:fixed; right:max(16px, calc(50vw - 324px)); bottom:calc(84px + env(safe-area-inset-bottom)); z-index:29;
  background:var(--brand-dark); color:#fff; border:none; border-radius:999px;
  padding:14px 20px; font-size:14px; font-weight:800; cursor:pointer;
  box-shadow:0 6px 18px rgba(11,93,58,.4);
}
/* ---------- sheet / overlay ---------- */
.overlay{position:fixed; inset:0; background:rgba(15,25,20,.5); z-index:50; display:none; align-items:flex-end; justify-content:center}
.overlay.open{display:flex}
.sheet{
  background:var(--card); width:100%; max-width:680px; max-height:90vh;
  border-radius:20px 20px 0 0; padding:16px 16px 28px; overflow-y:auto;
}
.sheet h3{margin:0 0 6px; font-size:17px; display:flex; justify-content:space-between; align-items:center; gap:10px}
.sheet h3 .x{background:var(--bg); border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-size:13px; color:var(--muted); flex:none}
/* ---------- toasts ---------- */
#toasts{position:fixed; top:12px; left:0; right:0; z-index:99; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none}
.toast{
  background:var(--ink); color:#fff; border-radius:14px; padding:12px 18px;
  font-size:13.5px; font-weight:700; box-shadow:0 6px 24px rgba(0,0,0,.3);
  max-width:90%; animation:pop .25s ease;
}
@keyframes pop{from{transform:translateY(-14px); opacity:0} to{transform:none; opacity:1}}
/* ---------- signature pad ---------- */
.sigwrap{position:relative; border:1.5px dashed var(--line); border-radius:10px; overflow:hidden; margin-top:6px; background:#fff}
.sigpad{width:100%; height:150px; display:block; touch-action:none; cursor:crosshair}
.sigwrap-hint{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--muted); font-size:13px; font-weight:700; pointer-events:none}
/* ---------- bins ---------- */
.bin-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(62px,1fr)); gap:6px}
.bin-cell{
  border-radius:9px; padding:7px 4px; text-align:center; cursor:pointer; color:#fff;
  font-size:11.5px; font-weight:800; line-height:1.25; border:none;
}
.bin-cell small{display:block; font-size:9px; font-weight:700; opacity:.85}
.b-yard{background:var(--brand)} .b-client{background:var(--amber)}
.b-unknown{background:#9aa0a6}
.legend{display:flex; flex-wrap:wrap; gap:12px; margin-top:10px}
.legend span{display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--muted); font-weight:700}
.dot{width:9px; height:9px; border-radius:3px; display:inline-block}
.stackbar{display:flex; height:12px; border-radius:6px; overflow:hidden; background:var(--line)}
.stackbar span{height:100%}
/* ---------- tables ---------- */
table.jt{width:100%; border-collapse:collapse; font-size:12.5px}
table.jt th{text-align:left; color:var(--muted); font-size:10.5px; letter-spacing:.4px; padding:6px 4px; border-bottom:2px solid var(--line)}
table.jt td{padding:8px 4px; border-bottom:1px solid var(--line); vertical-align:top}
table.jt tfoot td{font-weight:800; border-bottom:none; padding-top:10px}
/* ---------- earnings expandables ---------- */
details.drv{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:10px; overflow:hidden}
details.drv summary{list-style:none; cursor:pointer; padding:13px 14px; display:flex; align-items:center; gap:10px}
details.drv summary::-webkit-details-marker{display:none}
details.drv .body{padding:0 14px 12px}
/* ---------- misc ---------- */
.thumbs{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px}
.thumbs img{width:64px; height:64px; object-fit:cover; border-radius:10px; border:1px solid var(--line)}
.hero{
  background:linear-gradient(135deg, var(--brand), var(--brand-dark)); color:#fff;
  border-radius:var(--radius); padding:18px 16px; margin-bottom:12px; box-shadow:var(--shadow);
}
.hero .num{font-size:34px; font-weight:800}
.hero .lbl{font-size:12px; opacity:.85; font-weight:700}
.search{margin-bottom:10px}
</style>
</head>
<body>

<header><div class="hrow" id="header"></div></header>
<main id="main"></main>
<nav id="nav"></nav>
<button class="fab" id="fab" style="display:none"></button>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>
<div id="toasts"></div>

<script src="app.js"></script>
<script>
if('serviceWorker' in navigator && (location.protocol==='https:' || ['localhost','127.0.0.1'].includes(location.hostname))){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
